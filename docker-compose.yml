version: "3.9"

services:
  hotel-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    command: ["python", "mcp_servers/hotel_server.py"]
    env_file: .env
    ports:
      - "8001:8001"

  flight-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    command: ["python", "mcp_servers/flight_server.py"]
    env_file: .env
    ports:
      - "8002:8002"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    environment:
      - HOTEL_MCP_URL=http://hotel-mcp:8001/mcp
      - FLIGHT_MCP_URL=http://flight-mcp:8002/mcp
    depends_on:
      - hotel-mcp
      - flight-mcp
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    env_file: .env
    environment:
      - BACKEND_URL=http://backend:8000/chat
    depends_on:
      - backend
    ports:
      - "7860:7860"